name: CI Web

on:
  push:
    branches: ["master", "develop"]
    paths-ignore:
      - "apps/strategis-api/**"
      - ".github/workflows/ci-api.yml"
      - ".github/workflows/cd-api.yml"
  pull_request:
    branches: ["master", "develop"]
    paths-ignore:
      - "apps/strategis-api/**"
      - ".github/workflows/ci-api.yml"
      - ".github/workflows/cd-api.yml"

permissions:
  actions: read
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Create local master branch for NX affected
        run: git branch --track master origin/master || true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "yarn"

      - run: yarn install --frozen-lockfile
      - run: yarn nx affected -t lint test build
