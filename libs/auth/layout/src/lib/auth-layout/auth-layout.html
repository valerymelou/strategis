<div class="flex min-h-screen">
  <!-- Left panel: brand -->
  <aside
    class="bg-accent hidden w-1/2 shrink-0 flex-col px-12 pt-12 pb-12 lg:flex"
  >
    <!-- Logo -->
    <a href="/" class="flex items-center gap-3">
      <div
        class="bg-background flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-xl"
      >
        <div class="size-12 overflow-hidden rounded-full">
          <img src="/logo_48x48.png" alt="Strategis Flow" />
        </div>
      </div>
      <span
        class="text-accent-foreground font-serif text-xl tracking-[0.16px]"
        i18n="@@auth.layout.brand"
        >Strategis Flow</span
      >
    </a>

    <!-- Separator -->
    <div class="border-accent-foreground/20 mt-5 w-full border-t"></div>

    <!-- Tagline + description -->
    <div class="mt-32">
      <h1
        class="text-accent-foreground font-serif text-[54px] leading-14 tracking-[0.432px] not-italic"
      >
        <span>Waste flow<br />orchestration<br />platform<br /></span>
        <em i18n="@@auth.layout.tagline.italic">for the sector</em>
      </h1>
      <p
        class="text-accent-foreground/70 mt-16 max-w-92.75 font-sans text-sm leading-4 tracking-[0.112px]"
        i18n="@@auth.layout.description"
      >
        For producers, collectors, transporters, sorters, recyclers, processors
        and waste eliminators in the sector.
      </p>
    </div>
  </aside>

  <!-- Right panel: auth content hosted by child routes -->
  <main
    class="bg-background flex flex-1 flex-col items-center justify-center overflow-y-auto px-12 py-16"
  >
    <router-outlet />
  </main>
</div>
