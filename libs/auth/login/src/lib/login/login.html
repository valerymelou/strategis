<div class="flex w-full flex-col">
  <!-- Title -->
  <h1
    class="font-serif text-[36px] leading-14 tracking-[0.288px]"
    i18n="@@login.title"
  >
    Sign in
  </h1>

  <!-- Form -->
  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="mt-10 flex flex-col"
    novalidate
  >
    <!-- Email -->
    <div class="flex flex-col gap-1.5">
      <label
        for="email"
        class="text-foreground text-xs font-medium tracking-[0.096px]"
        i18n="@@login.email.label"
      >
        Email address
      </label>
      <input
        id="email"
        type="email"
        ui-input
        formControlName="email"
        autocomplete="email"
        i18n-placeholder="@@login.email.placeholder"
        placeholder="name@company.com"
        [class.border-destructive]="email.invalid && email.touched"
      />
      @if (email.invalid && email.touched) {
      <p class="text-destructive text-xs" i18n="@@login.email.error">
        Please enter a valid email address.
      </p>
      }
    </div>

    <!-- Password -->
    <div class="mt-6 flex flex-col gap-1.5">
      <label
        for="password"
        class="text-foreground text-xs font-medium tracking-[0.096px]"
        i18n="@@login.password.label"
      >
        Password
      </label>
      <input
        id="password"
        type="password"
        ui-input
        formControlName="password"
        autocomplete="current-password"
        i18n-placeholder="@@login.password.placeholder"
        placeholder="•••••••••••••••"
        [class.border-destructive]="password.invalid && password.touched"
      />
      @if (password.invalid && password.touched) {
      <p class="text-destructive text-xs" i18n="@@login.password.error">
        Password is required.
      </p>
      }
    </div>

    <!-- Server error -->
    @if (errorMessage()) {
    <p
      class="bg-destructive/10 text-destructive mt-4 rounded px-3 py-2 text-sm"
    >
      {{ errorMessage() }}
    </p>
    }

    <!-- Submit -->
    <button
      type="submit"
      ui-button
      [className]="'mt-11 h-12 w-full'"
      [disabled]="isLoading()"
    >
      @if (isLoading()) {
      <span i18n="@@login.submit.loading">Signing in…</span>
      } @else {
      <span i18n="@@login.submit.label">Sign in →</span>
      }
    </button>
  </form>

  <!-- Link to register -->
  <p
    class="text-muted-foreground mt-4 text-xs tracking-[0.096px]"
    i18n="@@login.register.prompt"
  >
    Don't have an account?
    <a
      routerLink="/auth/register"
      class="text-foreground ml-1 underline underline-offset-2"
      >Create one</a
    >
  </p>
</div>
