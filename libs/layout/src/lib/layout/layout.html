<ui-toast-container />
<div class="bg-background flex h-screen overflow-hidden">
  @if (sidebarOpen()) {
  <div
    class="fixed inset-0 z-20 bg-black/30 backdrop-blur-sm lg:hidden"
    (click)="closeSidebar()"
    (keydown.escape)="closeSidebar()"
    tabindex="0"
  ></div>
  }

  <app-sidebar [open]="sidebarOpen()" (closeRequest)="closeSidebar()" />

  <div class="flex flex-1 flex-col overflow-hidden">
    <app-navbar (hamburgerClick)="toggleSidebar()" />
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>
  </div>
</div>
