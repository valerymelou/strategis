<header class="flex h-16 shrink-0 items-center border-b px-7">
  <button
    uiButton
    variant="ghost"
    size="icon"
    class="mr-3 lg:hidden"
    (click)="hamburgerClick.emit()"
    aria-label="Toggle sidebar"
    i18n-aria-label="@@navbar.hamburger.ariaLabel"
  >
    <ng-icon name="lucideMenu" size="18" />
  </button>

  <p class="flex-1 font-mono text-[10px] tracking-[0.08px]">
    <span class="text-muted-foreground" i18n="@@navbar.breadcrumb.section"
      >WORKSPACE</span
    >
    <span class="text-muted-foreground"> / </span>
    <span class="text-foreground/60" i18n="@@navbar.breadcrumb.page"
      >OVERVIEW</span
    >
  </p>

  <div class="flex items-center gap-1">
    <button
      uiButton
      variant="ghost"
      size="icon"
      (click)="toggleTheme()"
      aria-label="Toggle theme"
      i18n-aria-label="@@navbar.theme.ariaLabel"
    >
      <ng-icon [name]="themeIcon()" size="18" />
    </button>
    <button uiButton variant="ghost" size="sm" (click)="toggleLanguage()">
      {{ currentLanguage() | uppercase }}
    </button>
  </div>
</header>
