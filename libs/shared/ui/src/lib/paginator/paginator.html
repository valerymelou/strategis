<div class="flex flex-col gap-2 py-3 sm:flex-row sm:items-center sm:justify-between">
  <p class="text-muted-foreground text-sm">
    @if (count() > 0) {
    <span i18n>Showing {{ from() }}–{{ to() }} of {{ count() }} results</span>
    }
  </p>
  <div class="flex items-center gap-2">
    <button
      ui-button
      variant="outline"
      size="sm"
      [disabled]="page() <= 1"
      (click)="prev()"
    >
      <ng-icon name="lucideChevronLeft" size="14" />
      <ng-container i18n>Previous</ng-container>
    </button>
    <span class="text-muted-foreground min-w-20 text-center text-sm" i18n
      >Page {{ page() }} of {{ pages() }}</span
    >
    <button
      ui-button
      variant="outline"
      size="sm"
      [disabled]="page() >= pages()"
      (click)="next()"
    >
      <ng-container i18n>Next</ng-container>
      <ng-icon name="lucideChevronRight" size="14" />
    </button>
  </div>
</div>
