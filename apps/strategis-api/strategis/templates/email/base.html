{% load i18n %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} Strategis Flow {% endblock title %}</title>
  </head>
  <body
    style="
      background-color: #f4f4f5;
      margin: 0;
      padding: 0;
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
        sans-serif;
      color: #111827;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="background-color: #f4f4f5; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
            style="
              max-width: 560px;
              background-color: #ffffff;
              border-radius: 12px;
              overflow: hidden;
            "
          >
            <!-- Brand header -->
            <tr>
              <td style="background-color: #111827; padding: 20px 32px">
                <span
                  style="
                    font-size: 18px;
                    font-weight: 700;
                    color: #ffffff;
                    letter-spacing: -0.2px;
                  "
                  >Strategis Flow</span
                >
              </td>
            </tr>
            <!-- Main content -->
            <tr>
              <td style="padding: 32px 32px 28px">
                {% block content %} {% endblock content %}
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td
                style="
                  border-top: 1px solid #e5e7eb;
                  padding: 20px 32px;
                  background-color: #f9fafb;
                "
              >
                <p style="margin: 0; font-size: 12px; color: #9ca3af">
                  {% translate "The Strategis Flow Team" %}
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
